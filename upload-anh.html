<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='/images/favicon.ico' rel='icon' type='image/x-icon'>
    <link href='https://cdn.jsdelivr.net/gh/blogspotvn/tool/css/font-awesome/5.15.4/css/all.css' rel='stylesheet' type='text/css'/>
    <link rel="stylesheet" href="/css/style.css">
    <title>Upload Ảnh</title>
   </head>
    <style>
body.loading .loading-modal {
    display:block
}
.dropzone {
    border: 2px dashed #dd6666;
    border-radius:10px;
    position:relative;
    margin:0 auto;
    clear:both;
    background: #eee;
}
.container {
    width: 1024px;
    max-width: 90%;
    margin: 30px auto;
} 
.vnc-file-box{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  border:1.5px solid #e5e7eb;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
  background:#fafafa;
}

.vnc-file-box:hover{
  border-color:#2563eb;
  background:#f5f9ff;
}

.vnc-file-icon{
  width:42px;
  height:42px;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.vnc-file-text{
  display:flex;
  flex-direction:column;
  font-size:14px;
}

.vnc-file-text span{
  font-size:12px;
  color:#6b7280;
}
.vnc-success{
  margin-top:12px;
  text-align: center;  
}

.vnc-success-text, .vnc-tb-text{
  font-size:14px;
  color:#16a34a;
  font-weight:600;
  margin-bottom:8px;
  text-align: center;
  gap:6px;
}

.vnc-check{
  background:#16a34a;
  color:#fff;
  width:18px;
  height:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  font-size:12px;
}

.vnc-input-group{
  display:flex;
  gap:6px;
}

.vnc-input-group input{
  flex:1;
  height:38px;
  border:1px solid #ddd;
  border-radius:8px;
  padding:0 10px;
  font-size:13px;
}
  
.vnc-btn{
  margin-top:10px;
  width:100%;
  height:40px;
  border:none;
  border-radius:10px;
  background:#1877f2;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.vnc-btn:hover{
  opacity:.9;
}  

.vnc-copy-btn{
  height:38px;
  padding:0 14px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  white-space:nowrap;
}

.vnc-copy-btn:hover{
  background:#1d4ed8;
}  
.vnc-preview {
    text-align: center;
    margin: 20px 0;
}   
img#preview {
    max-width: 100%;
}
    </style>
  <body>
      <div class="top-header">
            <a class="logo" href="https://tool.vncoding.com" id="logo">
                <div class="logotop">
                    <img src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&size=50&url=https://www.vncoding.com"/>
                </div>
                <div class="text">VNCoding.Com</div>
            </a>
        </div>
    <div class='container'>
    <header>
        <h1>Upload Ảnh</h1>
    </header>
      <div class="vnc-tb-text">
      <span class="vnc-check">✔</span> Upload ảnh chỉ dành cho hệ thống comment của VNCoding.Com
    </div>
<div class="vnc-upload-box">
<div class="vnc-file-box" onclick="document.getElementById('uploadInput').click()">
  <div class="vnc-file-icon">📷</div>
  <div class="vnc-file-text">
    <b>Chọn ảnh</b>
    <span id="fileName">Chưa có file nào</span>
  </div>
</div>

<input type="file" id="uploadInput" accept="image/*" hidden onchange="handleFileName()">

  <button class="vnc-btn" onclick="startUpload()">Upload ảnh</button>

  <div id="result" class="vnc-result"></div>

  <div class="vnc-preview">
    <img id="preview">
  </div>

</div>

<script>
const API = "https://img.vncoding.com";

async function startUpload(){

  const file = document.getElementById("uploadInput").files[0];

  if(!file){
    alert("Chọn ảnh đi");
    return;
  }

  const base64 = await compressImage(file);

  document.getElementById("result").innerHTML = "⏳ Đang upload...";

  try{

    const res = await fetch(API + "?ip=" + getIP(), {
      method: "POST",
      body: JSON.stringify({
        image: base64.split(",")[1],
        type: "image/webp"
      }),
      headers: {
        "Content-Type": "application/json"
      }
    });

    const data = await res.json();

    if(data.status === "success"){

      const finalUrl = convertDriveLink(data.url);

      document.getElementById("preview").src = finalUrl;

document.getElementById("result").innerHTML = `
  <div class="vnc-success">
    <div class="vnc-success-text">
      <span class="vnc-check">✔</span> Upload thành công
    </div>

    <div class="vnc-input-group">
      <input id="imgLink" value="${finalUrl}" readonly>
      <button class="vnc-copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>
`;

    }else{
      document.getElementById("result").innerText = data.message;
    }

  }catch(e){
    document.getElementById("result").innerText = "❌ Lỗi upload";
  }
}
  
function handleFileName(){
  const file = document.getElementById("uploadInput").files[0];
  document.getElementById("fileName").innerText = file ? file.name : "Chưa có file nào";
}  

function copyLink(){
  const input = document.getElementById("imgLink");
  navigator.clipboard.writeText(input.value);

  const btn = document.querySelector(".vnc-copy-btn");
  btn.innerText = "Copied!";
  btn.style.background = "#16a34a";

  setTimeout(()=>{
    btn.innerText = "Copy";
    btn.style.background = "#2563eb";
  },1500);
}

// 📉 compress + watermark
async function compressImage(file){

  const img = await createImageBitmap(file);

  const canvas = document.createElement("canvas");

  const MAX_WIDTH = 1280;

  let scale = Math.min(1, MAX_WIDTH / img.width);

  canvas.width = img.width * scale;
  canvas.height = img.height * scale;

  const ctx = canvas.getContext("2d");

  // vẽ ảnh
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

// =========================
// 🔥 WATERMARK VNCODING PRO
// =========================

const text = "vncoding.com";

// size chữ theo ảnh
const fontSize = Math.max(16, canvas.width * 0.02);
ctx.font = `bold ${fontSize}px Arial`;

const padding = 16;
const radius = 10;

const textWidth = ctx.measureText(text).width;

const boxWidth = textWidth + padding * 2;
const boxHeight = fontSize + padding;

const x = canvas.width - boxWidth - 20;
const y = canvas.height - boxHeight - 20;

// 👉 vẽ rounded box
ctx.beginPath();
ctx.moveTo(x + radius, y);
ctx.lineTo(x + boxWidth - radius, y);
ctx.quadraticCurveTo(x + boxWidth, y, x + boxWidth, y + radius);
ctx.lineTo(x + boxWidth, y + boxHeight - radius);
ctx.quadraticCurveTo(x + boxWidth, y + boxHeight, x + boxWidth - radius, y + boxHeight);
ctx.lineTo(x + radius, y + boxHeight);
ctx.quadraticCurveTo(x, y + boxHeight, x, y + boxHeight - radius);
ctx.lineTo(x, y + radius);
ctx.quadraticCurveTo(x, y, x + radius, y);
ctx.closePath();

// 👉 nền trong suốt nhẹ (glass effect)
ctx.fillStyle = "rgba(0,0,0,0.25)";
ctx.fill();

// 👉 viền mờ
ctx.strokeStyle = "rgba(255,255,255,0.3)";
ctx.lineWidth = 1;
ctx.stroke();

// 👉 chữ
ctx.fillStyle = "rgba(255,255,255,0.85)";
ctx.fillText(text, x + padding, y + boxHeight - 6);

// =========================


  return canvas.toDataURL("image/webp", 0.7);
}

function getIP(){
  return localStorage.getItem("vnc_ip") || (function(){
    let ip = Math.random().toString(36).substring(2);
    localStorage.setItem("vnc_ip", ip);
    return ip;
  })();
}

function convertDriveLink(url){

  let match = url.match(/id=([a-zA-Z0-9_-]+)/);

  if(match){
    return "https://lh3.googleusercontent.com/d/" + match[1] + "=w1000";
  }

  if(url.includes("lh3.googleusercontent.com")){
    return url;
  }

  return url;
}
</script>
