<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href='/images/favicon.ico' rel='icon' type='image/x-icon'>
<link href='https://cdn.jsdelivr.net/gh/blogspotvn/tool/css/font-awesome/5.15.4/css/all.css' rel='stylesheet'/>
<link rel="stylesheet" href="/css/style.css">
<title>Upload Ảnh</title>

<style>
body.loading .loading-modal{display:block}
.container{width:1024px;max-width:90%;margin:30px auto}
h1{text-align:center;color:#005b54}
.vnc-upload-box{max-width:420px;margin:auto;padding:20px;border:1px solid #eee;border-radius:12px;background:#fff}
.vnc-file-box{display:flex;align-items:center;gap:12px;padding:14px;border:2px dashed #ddd;border-radius:10px;cursor:pointer;margin-bottom:10px}
.vnc-file-icon{font-size:24px}
.vnc-btn{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;margin-top:10px;cursor:pointer}
.vnc-btn:disabled{background:#9ca3af;cursor:not-allowed}
.vnc-preview img{max-width:100%;margin-top:10px;border-radius:10px}
.vnc-input-group{display:flex;gap:6px;margin-top:10px}
.vnc-input-group input{flex:1;padding:8px;border:1px solid #ddd;border-radius:6px}
.vnc-copy-btn{padding:8px 10px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer}
.vnc-success{margin-top:10px}
.vnc-note{margin-top:12px;padding:12px 14px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;font-size:13px;line-height:1.6;color:#9a3412}
.vnc-note ul{padding-left:18px;margin:6px 0}
.quota{font-size:12px;color:#666;margin-top:6px}
.quota.low{color:#dc2626;font-weight:600}
</style>
</head>

<body>

<div class="top-header">
  <a class="logo" href="https://tool.vncoding.com">
    <div class="logotop">
      <img src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&size=50&url=https://www.vncoding.com"/>
    </div>
    <div class="text">VNCoding.Com</div>
  </a>
</div>

<div class="container">

<header>
  <h1>Upload Ảnh</h1>
</header>

<div class="vnc-upload-box">

  <div class="vnc-file-box" onclick="uploadInput.click()">
    <div class="vnc-file-icon">📷</div>
    <div>
      <b>Chọn ảnh</b><br>
      <span id="fileName">Chưa có file nào</span>
    </div>
  </div>

  <input type="file" id="uploadInput" accept="image/*" hidden onchange="handleFileName()">

  <button id="uploadBtn" class="vnc-btn" onclick="startUpload()">Upload ảnh</button>

  <div id="quota" class="quota">Đang tải quota...</div>

  <div id="result"></div>

  <div class="vnc-preview">
    <img id="preview">
  </div>

  <div class="vnc-note">
    📌 Công cụ này chỉ dùng cho bình luận tại <b>VNCoding.com</b>.<br><br>
    ⚠️ Giới hạn:
    <ul>
      <li>1 ảnh / 10 giây</li>
      <li>20 ảnh / giờ</li>
    </ul>
    🚫 Spam sẽ bị chặn tự động.
  </div>

</div>
</div>

<script>
const API = "https://img.vncoding.com";
let remainUpload = 20;

// =================== LOAD QUOTA ===================
getQuota();

async function getQuota(){
  try{
    const res = await fetch(API,{method:"POST"});
    const data = await res.json();

    if(data.remain !== undefined){
      updateQuota(data.remain);
    }
  }catch(e){
    document.getElementById("quota").innerText = "Không lấy được quota";
  }
}

function updateQuota(remain){
  remainUpload = remain;

  const el = document.getElementById("quota");

  el.innerText = "📊 Bạn còn " + remain + " lượt upload trong giờ";

  if(remain <= 5){
    el.classList.add("low");
  }

  if(remain <= 0){
    document.getElementById("uploadBtn").disabled = true;
  }
}

// =================== UPLOAD ===================
async function startUpload(){

  if(remainUpload <= 0){
    alert("⛔ Bạn đã hết lượt upload");
    return;
  }

  const file = uploadInput.files[0];

  if(!file){
    alert("Chọn ảnh đi anh em!");
    return;
  }

  const last = localStorage.getItem("vnc_last_upload");

  if(last && Date.now() - last < 10000){
    alert("⛔ Đợi 10 giây rồi upload tiếp");
    return;
  }

  localStorage.setItem("vnc_last_upload", Date.now());

  if(file.size > 2*1024*1024){
    alert("⛔ Ảnh tối đa 2MB");
    return;
  }

  if(!file.type.startsWith("image/")){
    alert("⛔ Chỉ cho phép ảnh");
    return;
  }

  const base64 = await compressImage(file);

  result.innerHTML = "⏳ Đang upload...";

  try{

    const res = await fetch(API,{
      method:"POST",
      body:JSON.stringify({
        image:base64.split(",")[1],
        type:"image/webp"
      }),
      headers:{"Content-Type":"application/json"}
    });

    const data = await res.json();

    if(data.status==="success"){

      const url = convertDriveLink(data.url);

      preview.src = url;

      updateQuota(data.remain);

      result.innerHTML = `
      <div class="vnc-success">
        ✔ Upload thành công
        <div style="font-size:12px;margin-top:4px">
          📊 Còn ${data.remain} lượt
        </div>

        <div class="vnc-input-group">
          <input id="imgLink" value="${url}" readonly>
          <button class="vnc-copy-btn" onclick="copyLink(this)">Copy</button>
        </div>
      </div>`;

    }else{
      result.innerText = data.message;
    }

  }catch(e){
    result.innerText = "❌ Lỗi upload";
  }
}

// =================== FILE NAME ===================
function handleFileName(){
  fileName.innerText = uploadInput.files[0]?.name || "Chưa có file nào";
}

// =================== COPY ===================
function copyLink(btn){
  navigator.clipboard.writeText(imgLink.value);

  btn.innerText = "✔";
  btn.style.background="#16a34a";

  setTimeout(()=>{
    btn.innerText="Copy";
    btn.style.background="#2563eb";
  },1200);
}

// =================== COMPRESS ===================
async function compressImage(file){

  const img = await createImageBitmap(file);

  const canvas = document.createElement("canvas");

  const scale = Math.min(1,1280/img.width);

  canvas.width = img.width*scale;
  canvas.height = img.height*scale;

  const ctx = canvas.getContext("2d");

  ctx.drawImage(img,0,0,canvas.width,canvas.height);

  // watermark
  const text="vncoding.com";
  const fs = Math.max(16,canvas.width*0.02);

  ctx.font=`bold ${fs}px Arial`;

  const w = ctx.measureText(text).width;

  const x = canvas.width - w - 30;
  const y = canvas.height - 20;

  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(x-10,y-fs,w+20,fs+10);

  ctx.fillStyle="rgba(255,255,255,0.85)";
  ctx.fillText(text,x,y);

  return canvas.toDataURL("image/webp",0.7);
}

// =================== LINK ===================
function convertDriveLink(url){
  const m = url.match(/id=([a-zA-Z0-9_-]+)/);
  return m ? "https://lh3.googleusercontent.com/d/"+m[1]+"=w1000" : url;
}
</script>

<div class="copyright-container">
<p class="text-center">© <span id="year"></span> by <a href="https://www.vncoding.com/">VNCoding.Com</a></p>
</div>

<script>
document.getElementById("year").innerText = new Date().getFullYear();
</script>

</body>
</html>
