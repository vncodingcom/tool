   </head>
    <style>

    display:block

    border: 2px dashed #dd6666;
    border-radius:10px;
    position:relative;
    margin:0 auto;
    clear:both;
    background: #eee;

.vnc-upload-box{max-width:420px;margin:auto;padding:20px;border:1px solid #eee;border-radius:12px;background:#fff}

  <body>
      <div class="top-header">
            <a class="logo" href="https://tool.vncoding.com" id="logo">
                <div class="logotop">
                    <img src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&size=50&url=https://www.vncoding.com"/>
                </div>
                <div class="text">VNCoding.Com</div>
            </a>
        </div>
    <div class='container'>
    <header>
        <h1>Upload Ảnh</h1>
    </header>
<div class="vnc-upload-box">

  <h3>Upload ảnh chỉ dành cho hệ thống comment của VNCoding.Com</h3>

  <div class="vnc-file-box" onclick="document.getElementById('uploadInput').click()">
    <div class="vnc-file-icon">📷</div>
    <div class="vnc-file-text">
      <b>Chọn ảnh</b>
      <span id="fileName">Chưa có file nào</span>
    </div>
  </div>

  <input type="file" id="uploadInput" accept="image/*" hidden onchange="handleFileName()">

  <button class="vnc-btn" onclick="startUpload()">Upload ảnh</button>

  <div id="result" class="vnc-result"></div>

  <div class="vnc-preview">
    <img id="preview">
  </div>

</div>


<script>
const API = "https://img.vncoding.com";

// 🚀 UPLOAD
async function startUpload(){

  const file = document.getElementById("uploadInput").files[0];

  // ⛔ chưa chọn file
  if(!file){
    alert("Chọn ảnh đi anh em!");
    return;
  }

  // ⛔ chống spam 10s
  const last = localStorage.getItem("vnc_last_upload");
  if(last && Date.now() - last < 10000){
    alert("⛔ Bạn thao tác quá nhanh");
    return;
  }
  localStorage.setItem("vnc_last_upload", Date.now());

  // ⛔ check dung lượng
  if(file.size > 2 * 1024 * 1024){
    alert("⛔ Ảnh tối đa 2MB");
    return;
  }

  // ⛔ check loại file
  if(!file.type.startsWith("image/")){
    alert("⛔ Chỉ cho phép ảnh");
    return;
  }

  const base64 = await compressImage(file);

  document.getElementById("result").innerHTML = "⏳ Đang upload...";

  try{

    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        image: base64.split(",")[1],
        type: "image/webp"
      }),
      headers: {
        "Content-Type": "application/json"
      }
    });

    const data = await res.json();

    if(data.status === "success"){

      const finalUrl = convertDriveLink(data.url);

      document.getElementById("preview").src = finalUrl;

      document.getElementById("result").innerHTML = `
      <div class="vnc-success">
        ✔ Upload thành công
        <div class="vnc-input-group">
          <input id="imgLink" value="${finalUrl}" readonly>
          <button class="vnc-copy-btn" onclick="copyLink()">Copy</button>
        </div>
      </div>`;

    }else{
      document.getElementById("result").innerText = data.message;
    }

  }catch(e){
    document.getElementById("result").innerText = "❌ Lỗi upload";
  }
}

// 📛 tên file
function handleFileName(){
  const file = document.getElementById("uploadInput").files[0];
  document.getElementById("fileName").innerText = file ? file.name : "Chưa có file nào";
}

// 📋 copy
function copyLink(){
  const input = document.getElementById("imgLink");
  navigator.clipboard.writeText(input.value);
}

// 🖼 compress + watermark
async function compressImage(file){

  const img = await createImageBitmap(file);

  const canvas = document.createElement("canvas");

  const scale = Math.min(1, 1280 / img.width);

  canvas.width = img.width * scale;
  canvas.height = img.height * scale;

  const ctx = canvas.getContext("2d");

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  // 🔥 WATERMARK
  const text = "vncoding.com";
  const fontSize = Math.max(16, canvas.width * 0.02);

  ctx.font = `bold ${fontSize}px Arial`;

  const padding = 16;
  const radius = 10;

  const textWidth = ctx.measureText(text).width;

  const boxWidth = textWidth + padding * 2;
  const boxHeight = fontSize + padding;

  const x = canvas.width - boxWidth - 20;
  const y = canvas.height - boxHeight - 20;

  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + boxWidth - radius, y);
  ctx.quadraticCurveTo(x + boxWidth, y, x + boxWidth, y + radius);
  ctx.lineTo(x + boxWidth, y + boxHeight - radius);
  ctx.quadraticCurveTo(x + boxWidth, y + boxHeight, x + boxWidth - radius, y + boxHeight);
  ctx.lineTo(x + radius, y + boxHeight);
  ctx.quadraticCurveTo(x, y + boxHeight, x, y + boxHeight - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();

  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fill();

  ctx.strokeStyle = "rgba(255,255,255,0.3)";
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.fillText(text, x + padding, y + boxHeight - 6);

  return canvas.toDataURL("image/webp", 0.7);
}

// 🔗 convert link
function convertDriveLink(url){

  let match = url.match(/id=([a-zA-Z0-9_-]+)/);

  if(match){
    return "https://lh3.googleusercontent.com/d/" + match[1] + "=w1000";
  }

  return url;
}
</script>
